  <agent_config>
    <!-- ======================================================= -->
    <!--     WINDOWS SERVER 2022 — DC01                          -->
    <!--     Roles: Active Directory DS + DNS + CA               -->
    <!--     Services: Sysmon64, WinDefend, CertSvc,             -->
    <!--               Kerberos, NTDS, DFSR, Netbird,            -->
    <!--               WinRM, RDP, Spooler                       -->
    <!--     IP: 192.168.10.25                                   -->
    <!--     Generated: April 2026                               -->
    <!-- ======================================================= -->
    <!-- ==================== BUFFER ==================== -->
    <client_buffer>
      <disabled>no</disabled>
      <queue_size>10000</queue_size>
      <events_per_second>500</events_per_second>
    </client_buffer>
    <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
    <syscheck>
      <disabled>no</disabled>
      <frequency>43200</frequency>
      <scan_on_start>yes</scan_on_start>
      <!-- Windows system directories -->
      <directories check_all="yes">%WINDIR%\System32\drivers\etc</directories>
      <directories check_all="yes">%WINDIR%\System32\wbem</directories>
      <directories check_all="yes">%WINDIR%\System32\WindowsPowerShell</directories>
      <directories check_all="yes">%WINDIR%\SysWOW64\WindowsPowerShell</directories>
      <!-- AD specific — monitor SYSVOL and NETLOGON -->
      <!-- Any change here = potential GPO tampering -->
      <directories check_all="yes" realtime="yes">%WINDIR%\SYSVOL</directories>
      <directories check_all="yes" realtime="yes">%WINDIR%\SYSVOL\sysvol</directories>
      <!-- Hosts file — DNS poisoning detection -->
      <directories check_all="yes" realtime="yes">%WINDIR%\System32\drivers\etc</directories>
      <!-- Startup folders — persistence detection -->
      <directories check_all="yes" realtime="yes">%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\Startup</directories>
      <directories check_all="yes" realtime="yes">%WINDIR%\System32\GroupPolicy</directories>
      <!-- Certificate Authority — CertSvc is running -->
      <directories check_all="yes" realtime="yes">%WINDIR%\System32\CertSrv</directories>
      <directories check_all="yes">%WINDIR%\System32\certsrv</directories>
      <!-- Sysmon binary — detect tampering -->
      <directories check_all="yes" realtime="yes">%WINDIR%\Sysmon64.exe</directories>
      <!-- DNS config — DNS role is running -->
      <directories check_all="yes" realtime="yes">%WINDIR%\System32\dns</directories>
      <!-- Ignore noisy paths -->
      <ignore>%WINDIR%\System32\LogFiles</ignore>
      <ignore>%WINDIR%\System32\wbem\logs</ignore>
      <ignore>%WINDIR%\System32\catroot2</ignore>
      <ignore>%WINDIR%\SoftwareDistribution</ignore>
      <ignore>%WINDIR%\Prefetch</ignore>
      <ignore>%PROGRAMDATA%\Microsoft\Windows Defender</ignore>
      <ignore type="sregex">.log$|.ldf$|.evtx$|.tmp$|.etl$</ignore>
      <!-- Never diff sensitive files -->
      <nodiff>%WINDIR%\System32\config\SAM</nodiff>
      <nodiff>%WINDIR%\NTDS\ntds.dit</nodiff>
      <skip_nfs>yes</skip_nfs>
      <process_priority>10</process_priority>
      <max_eps>100</max_eps>
      <synchronization>
        <enabled>yes</enabled>
        <interval>5m</interval>
        <response_timeout>30</response_timeout>
        <queue_size>16384</queue_size>
        <max_eps>10</max_eps>
      </synchronization>
    </syscheck>
    <!-- ==================== WINDOWS EVENT LOGS ==================== -->
    <!-- ── SECURITY LOG — Most Critical ── -->
    <!-- Logon/Logoff, Account Management, Privilege Use -->
    <localfile>
      <location>Security</location>
      <log_format>eventchannel</log_format>
      <query>Event/System[EventID != 5156 and EventID != 5157 and EventID != 5158 and EventID != 4688 and EventID != 4703]</query>
      <!-- Filtering out noisy network connection and token events -->
      <!-- Key events captured: 4624,4625,4634,4648,4672,4698,4699,4700,4701,4702,4720,4722,4723,4724,4725,4726,4728,4732,4740,4756,4768,4769,4771,4776 -->
    </localfile>
    <!-- ── SYSTEM LOG ── -->
    <localfile>
      <location>System</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── APPLICATION LOG ── -->
    <localfile>
      <location>Application</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── SYSMON LOG — Critical for threat detection ── -->
    <!-- Process creation, network connections, file creation,    -->
    <!-- registry changes, WMI events, DNS queries               -->
    <localfile>
      <location>Microsoft-Windows-Sysmon/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── ACTIVE DIRECTORY ── -->
    <!-- Directory Service log — AD object changes, replication -->
    <localfile>
      <location>Directory Service</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- AD DS replication — DFSR -->
    <localfile>
      <location>DFS Replication</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── DNS SERVER ── -->
    <localfile>
      <location>DNS Server</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- DNS Analytical — detailed DNS query logging -->
    <localfile>
      <location>Microsoft-Windows-DNSServer/Audit</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── CERTIFICATE AUTHORITY ── -->
    <!-- CertSvc is running — monitor cert issuance -->
    <localfile>
      <location>Security</location>
      <log_format>eventchannel</log_format>
      <query>Event/System[EventID=4886 or EventID=4887 or EventID=4888 or EventID=4889 or EventID=4890 or EventID=4891 or EventID=4892 or EventID=4893]</query>
      <!-- 4886=Cert requested, 4887=Cert issued, 4888=Cert denied -->
    </localfile>
    <!-- ── POWERSHELL ── -->
    <!-- PowerShell script block logging — detects malicious PS -->
    <localfile>
      <location>Microsoft-Windows-PowerShell/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- PowerShell classic -->
    <localfile>
      <location>Windows PowerShell</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── WINDOWS DEFENDER ── -->
    <localfile>
      <location>Microsoft-Windows-Windows Defender/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── WINRM — Port 5985 is open ── -->
    <localfile>
      <location>Microsoft-Windows-WinRM/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── RDP — Port 3389 is open ── -->
    <localfile>
      <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <localfile>
      <location>Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── TASK SCHEDULER — Persistence detection ── -->
    <localfile>
      <location>Microsoft-Windows-TaskScheduler/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── PRINT SPOOLER — PrintNightmare detection ── -->
    <!-- Spooler is running — this is a known vulnerability -->
    <localfile>
      <location>Microsoft-Windows-PrintService/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <localfile>
      <location>Microsoft-Windows-PrintService/Admin</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── BITS — T1197 BITS Jobs persistence ── -->
    <localfile>
      <location>Microsoft-Windows-Bits-Client/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── APPLOCKER / CODE INTEGRITY ── -->
    <localfile>
      <location>Microsoft-Windows-CodeIntegrity/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── FIREWALL ── -->
    <localfile>
      <location>Microsoft-Windows-Windows Firewall With Advanced Security/Firewall</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── KERBEROS — KDC is running ── -->
    <localfile>
      <location>Microsoft-Windows-Kerberos/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── NETLOGON — Pass the hash detection ── -->
    <localfile>
      <location>Microsoft-Windows-Security-Netlogon/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── NTLM ── -->
    <localfile>
      <location>Microsoft-Windows-NTLM/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <!-- ── WAZUH ACTIVE RESPONSE ── -->
    <localfile>
      <location>active-response\active-responses.log</location>
      <log_format>syslog</log_format>
    </localfile>
    <!-- ==================== COMMAND MONITORING ==================== -->
    <!-- Running processes snapshot -->
    <localfile>
      <log_format>full_command</log_format>
      <command>tasklist /fo csv /nh 2>nul</command>
      <frequency>600</frequency>
    </localfile>
    <!-- Scheduled tasks — persistence detection -->
    <localfile>
      <log_format>full_command</log_format>
      <command>schtasks /query /fo csv /nh 2>nul</command>
      <frequency>3600</frequency>
    </localfile>
    <!-- Open network connections -->
    <localfile>
      <log_format>full_command</log_format>
      <command>netstat -ano 2>nul</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Local admin group members — detect privilege escalation -->
    <localfile>
      <log_format>full_command</log_format>
      <command>net localgroup administrators 2>nul</command>
      <frequency>3600</frequency>
    </localfile>
    <!-- Domain admin group — critical for DCSync detection -->
    <localfile>
      <log_format>full_command</log_format>
      <command>net group "Domain Admins" /domain 2>nul</command>
      <frequency>3600</frequency>
    </localfile>
    <!-- DNS zones — detect DNS record tampering -->
    <localfile>
      <log_format>full_command</log_format>
      <command>dnscmd /enumzones 2>nul</command>
      <frequency>3600</frequency>
    </localfile>
    <!-- Spooler service status — PrintNightmare monitoring -->
    <localfile>
      <log_format>full_command</log_format>
      <command>sc query Spooler 2>nul</command>
      <frequency>360</frequency>
    </localfile>
    <localfile>
      <log_format>full_command</log_format>
      <command>curl -s https://api.ipify.org 2>/dev/null || echo "unknown"</command>
      <alias>public_ip_check</alias>
      <frequency>3600</frequency>
    </localfile>
    <!-- ==================== SYSCOLLECTOR ==================== -->
    <wodle name="syscollector">
      <disabled>no</disabled>
      <interval>1h</interval>
      <scan_on_start>yes</scan_on_start>
      <packages>yes</packages>
      <os>yes</os>
      <hotfixes>yes</hotfixes>
      <ports all="no">yes</ports>
      <processes>yes</processes>
      <hardware>yes</hardware>
      <network>yes</network>
    </wodle>
    <!-- ==================== ROOTCHECK ==================== -->
    <rootcheck>
      <disabled>no</disabled>
      <frequency>43200</frequency>
      <windows_apps>./shared/win_applications_rcl.txt</windows_apps>
      <windows_malware>./shared/win_malware_rcl.txt</windows_malware>
    </rootcheck>
    <!-- ==================== VULNERABILITY DETECTION ==================== -->
    <wodle name="vulnerability-detector">
      <disabled>no</disabled>
      <interval>12h</interval>
      <run_on_start>yes</run_on_start>
      <provider name="msu">
        <enabled>yes</enabled>
        <update_interval>1h</update_interval>
      </provider>
    </wodle>
    <!-- ==================== SCA — Security Config Assessment ==================== -->
    <sca>
      <enabled>yes</enabled>
      <scan_on_start>yes</scan_on_start>
      <interval>12h</interval>
      <skip_nfs>yes</skip_nfs>
    </sca>
  </agent_config>
