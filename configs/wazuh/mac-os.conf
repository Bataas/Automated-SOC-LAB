  <agent_config>
    <!-- ==================== BUFFER SETTINGS ==================== -->
    <client_buffer>
      <disabled>no</disabled>
      <queue_size>5000</queue_size>
      <events_per_second>500</events_per_second>
    </client_buffer>
    <!-- ==================== ROOTCHECK ==================== -->
    <rootcheck>
      <disabled>no</disabled>
      <frequency>43200</frequency>
      <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
      <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
      <skip_nfs>yes</skip_nfs>
      <!-- Note: Linux audit files removed — not applicable on macOS -->
    </rootcheck>
    <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
    <syscheck>
      <disabled>no</disabled>
      <frequency>43200</frequency>
      <scan_on_start>yes</scan_on_start>
      <!-- Critical macOS system directories -->
      <directories check_all="yes">/etc</directories>
      <directories check_all="yes">/usr/bin</directories>
      <directories check_all="yes">/usr/sbin</directories>
      <directories check_all="yes">/bin</directories>
      <directories check_all="yes">/sbin</directories>
      <!-- macOS specific critical paths -->
      <directories check_all="yes">/Library/LaunchDaemons</directories>
      <directories check_all="yes">/Library/LaunchAgents</directories>
      <directories check_all="yes" realtime="yes">/Users/Shared</directories>
      <directories check_all="yes">/private/etc</directories>
      <!-- Monitor per-user LaunchAgents (persistence mechanism) -->
      <directories check_all="yes" realtime="yes">/Users/*/Library/LaunchAgents</directories>
      <!-- Ignore noisy macOS paths -->
      <ignore>/etc/mtab</ignore>
      <ignore>/private/etc/hosts.deny</ignore>
      <ignore>/private/var/log</ignore>
      <ignore>/private/tmp</ignore>
      <ignore>/private/var/folders</ignore>
      <ignore>/private/var/db/dyld</ignore>
      <ignore>/Library/Caches</ignore>
      <ignore>/System/Library/Caches</ignore>
      <!-- Ignore file types -->
      <ignore type="sregex">.log$|.swp$|.DS_Store$|.Spotlight-V100$</ignore>
      <!-- Never diff sensitive files -->
      <nodiff>/private/etc/ssl/private.key</nodiff>
      <nodiff>/private/etc/master.passwd</nodiff>
      <skip_nfs>yes</skip_nfs>
      <skip_dev>yes</skip_dev>
      <skip_proc>yes</skip_proc>
      <skip_sys>yes</skip_sys>
      <process_priority>10</process_priority>
      <max_eps>100</max_eps>
      <synchronization>
        <enabled>yes</enabled>
        <interval>5m</interval>
        <response_timeout>30</response_timeout>
        <queue_size>16384</queue_size>
        <max_eps>10</max_eps>
      </synchronization>
    </syscheck>
    <!-- ==================== LOG ANALYSIS ==================== -->
    <!-- Wazuh active responses -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/ossec/logs/active-responses.log</location>
    </localfile>
    <!-- macOS unified system log — authentication events -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/system.log</location>
    </localfile>
    <!-- macOS auth events (sudo, su, login) -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/auth.log</location>
    </localfile>
    <!-- macOS install/software change log -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/install.log</location>
    </localfile>
    <!-- Firewall log — requires pflog enabled in macOS -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/appfirewall.log</location>
    </localfile>
    <!-- Secure log — privilege escalation, SSH -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/private/var/log/secure.log</location>
    </localfile>
    <!-- ==================== COMMAND MONITORING ==================== -->
    <!-- Disk usage -->
    <localfile>
      <log_format>command</log_format>
      <command>df -P</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Open network connections -->
    <localfile>
      <log_format>full_command</log_format>
      <command>netstat -an | grep LISTEN | grep -v 127.0.0.1 | sort</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Recent logins -->
    <localfile>
      <log_format>full_command</log_format>
      <command>last -n 5</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Running processes snapshot -->
    <localfile>
      <log_format>full_command</log_format>
      <command>ps aux</command>
      <frequency>600</frequency>
    </localfile>
    <!-- Check for new LaunchAgents (persistence detection) -->
    <localfile>
      <log_format>full_command</log_format>
      <command>launchctl list | grep -v com.apple</command>
      <frequency>600</frequency>
    </localfile>
    <localfile>
      <log_format>full_command</log_format>
      <command>curl -s https://api.ipify.org 2>/dev/null || echo "unknown"</command>
      <alias>public_ip_check</alias>
      <frequency>3600</frequency>
    </localfile>
    <!-- ==================== SYSCOLLECTOR ==================== -->
    <!-- Collects hardware, OS, packages, ports, processes -->
    <wodle name="syscollector">
      <disabled>no</disabled>
      <interval>1h</interval>
      <scan_on_start>yes</scan_on_start>
      <packages>yes</packages>
      <os>yes</os>
      <ports all="no">yes</ports>
      <processes>yes</processes>
      <hardware>yes</hardware>
      <network>yes</network>
    </wodle>
    <!-- ==================== OSQUERY (optional) ==================== -->
    <!-- Enable if osquery is installed via Homebrew: brew install osquery -->
    <wodle name="osquery">
      <disabled>yes</disabled>
      <run_daemon>yes</run_daemon>
      <log_path>/var/log/osquery/osqueryd.results.log</log_path>
      <config_path>/etc/osquery/osquery.conf</config_path>
      <add_labels>yes</add_labels>
    </wodle>
  </agent_config>
