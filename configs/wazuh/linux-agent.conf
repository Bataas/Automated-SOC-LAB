  <agent_config>
    <!-- ======================================================= -->
    <!--     RASPBERRY PI 4 — PIVPN / WEB SERVER                 -->
    <!--     OS: Raspbian GNU/Linux 11 (Bullseye)                -->
    <!--     Hostname: pivpn                                      -->
    <!--     Public site: aftergrade12.com (WordPress)           -->
    <!--     Services: Apache2, WordPress, MariaDB, OpenVPN,     -->
    <!--               Cloudflared, Samba, Fail2ban, Auditd,     -->
    <!--               Exim4, SSH, VNC, PHP 7.4/8.4              -->
    <!--     Tunnel: Cloudflare (e342a71c)                       -->
    <!--     Generated: April 2026                               -->
    <!-- ======================================================= -->
    <!-- ==================== BUFFER ==================== -->
    <!-- Pi 4 has 4GB RAM but SD card is bottleneck -->
    <!-- High traffic site needs decent buffer -->
    <client_buffer>
      <disabled>no</disabled>
      <queue_size>5000</queue_size>
      <events_per_second>300</events_per_second>
    </client_buffer>
    <!-- ==================== ROOTCHECK ==================== -->
    <rootcheck>
      <disabled>no</disabled>
      <frequency>43200</frequency>
      <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
      <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
      <system_audit>/var/ossec/etc/shared/system_audit_rcl.txt</system_audit>
      <system_audit>/var/ossec/etc/shared/system_audit_ssh.txt</system_audit>
      <system_audit>/var/ossec/etc/shared/cis_debian_linux_rcl.txt</system_audit>
      <skip_nfs>yes</skip_nfs>
    </rootcheck>
    <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
    <syscheck>
      <disabled>no</disabled>
      <frequency>43200</frequency>
      <scan_on_start>yes</scan_on_start>
      <!-- Core system -->
      <directories check_all="yes" realtime="yes">/etc</directories>
      <directories check_all="yes">/usr/bin</directories>
      <directories check_all="yes">/usr/sbin</directories>
      <directories check_all="yes">/bin</directories>
      <directories check_all="yes">/sbin</directories>
      <directories check_all="yes">/boot</directories>
      <!-- ── WORDPRESS / APACHE ── -->
      <!-- Monitor WordPress core files — detect defacement/injection -->
      <directories check_all="yes" realtime="yes">/var/www/html</directories>
      <directories check_all="yes" realtime="yes">/var/www/aftergrade12</directories>
      <!-- Apache config -->
      <directories check_all="yes" realtime="yes">/etc/apache2</directories>
      <!-- PHP config — both versions -->
      <directories check_all="yes">/etc/php/7.4/apache2</directories>
      <directories check_all="yes">/etc/php/8.4/apache2</directories>
      <directories check_all="yes">/etc/php/7.4/fpm</directories>
      <directories check_all="yes">/etc/php/8.4/fpm</directories>
      <!-- ── CLOUDFLARED ── -->
      <directories check_all="yes" realtime="yes">/etc/cloudflared</directories>
      <directories check_all="yes" realtime="yes">/root/.cloudflared</directories>
      <!-- ── OPENVPN ── -->
      <!-- Critical — any change here could expose VPN clients -->
      <directories check_all="yes" realtime="yes">/etc/openvpn</directories>
      <!-- ── MARIADB ── -->
      <directories check_all="yes">/etc/mysql</directories>
      <!-- ── SAMBA ── -->
      <directories check_all="yes" realtime="yes">/etc/samba</directories>
      <!-- ── SSH ── -->
      <directories check_all="yes" realtime="yes">/etc/ssh</directories>
      <!-- ── FAIL2BAN ── -->
      <directories check_all="yes" realtime="yes">/etc/fail2ban</directories>
      <!-- ── EXIM4 MAIL ── -->
      <directories check_all="yes">/etc/exim4</directories>
      <!-- ── AUDIT ── -->
      <directories check_all="yes" realtime="yes">/etc/audit</directories>
      <!-- ── CRON ── persistence detection -->
      <directories check_all="yes" realtime="yes">/etc/cron.d</directories>
      <directories check_all="yes" realtime="yes">/etc/cron.daily</directories>
      <directories check_all="yes" realtime="yes">/etc/cron.weekly</directories>
      <directories check_all="yes" realtime="yes">/var/spool/cron/crontabs</directories>
      <!-- ── CUPS ── -->
      <directories check_all="yes">/etc/cups</directories>
      <!-- ── IGNORE NOISY PATHS ── -->
      <ignore>/etc/mtab</ignore>
      <ignore>/etc/hosts.deny</ignore>
      <ignore>/etc/adjtime</ignore>
      <ignore>/proc</ignore>
      <ignore>/sys</ignore>
      <ignore>/run</ignore>
      <ignore>/dev</ignore>
      <ignore>/tmp</ignore>
      <ignore>/var/log</ignore>
      <ignore>/var/cache</ignore>
      <ignore>/var/tmp</ignore>
      <ignore>/var/lib/mysql</ignore>
      <!-- WordPress dynamic files — very noisy, ignore -->
      <ignore>/var/www/html/wp-content/cache</ignore>
      <ignore>/var/www/html/wp-content/uploads</ignore>
      <ignore>/var/www/html/wp-content/upgrade</ignore>
      <ignore>/var/www/html/.maintenance</ignore>
      <!-- Apache runtime -->
      <ignore>/etc/apache2/envvars</ignore>
      <!-- Ignore file types -->
      <ignore type="sregex">.log$|.swp$|.db-journal$|.tmp$|.pid$|.sess_</ignore>
      <!-- Never diff — sensitive -->
      <nodiff>/var/www/html/wp-config.php</nodiff>
      <nodiff>/etc/openvpn/server.conf</nodiff>
      <nodiff>/root/.cloudflared/e342a71c-fe1d-474d-bfa2-33142137a793.json</nodiff>
      <nodiff>/etc/mysql/debian.cnf</nodiff>
      <nodiff>/etc/samba/smbpasswd</nodiff>
      <skip_nfs>yes</skip_nfs>
      <skip_dev>yes</skip_dev>
      <skip_proc>yes</skip_proc>
      <skip_sys>yes</skip_sys>
      <process_priority>10</process_priority>
      <max_eps>100</max_eps>
      <synchronization>
        <enabled>yes</enabled>
        <interval>5m</interval>
        <response_timeout>30</response_timeout>
        <queue_size>16384</queue_size>
        <max_eps>10</max_eps>
      </synchronization>
    </syscheck>
    <!-- ==================== SYSTEM LOGS ==================== -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/ossec/logs/active-responses.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/syslog</location>
    </localfile>
    <!-- Auth — SSH logins, sudo, su, VPN auth -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/auth.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/kern.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/daemon.log</location>
    </localfile>
    <!-- Package installs — detect backdoor installs -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/dpkg.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/apt/history.log</location>
    </localfile>
    <!-- Boot log -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/boot.log</location>
    </localfile>
    <!-- ==================== APACHE / WORDPRESS LOGS ==================== -->
    <!-- aftergrade12.com access — high traffic, publicly exposed -->
    <localfile>
      <log_format>apache</log_format>
      <location>/var/log/apache2/aftergrade12_access.log</location>
    </localfile>
    <!-- aftergrade12.com errors — PHP errors, 500s, attacks -->
    <localfile>
      <log_format>apache</log_format>
      <location>/var/log/apache2/aftergrade12_error.log</location>
    </localfile>
    <!-- General Apache access -->
    <localfile>
      <log_format>apache</log_format>
      <location>/var/log/apache2/access.log</location>
    </localfile>
    <!-- General Apache error -->
    <localfile>
      <log_format>apache</log_format>
      <location>/var/log/apache2/error.log</location>
    </localfile>
    <!-- Other vhosts -->
    <localfile>
      <log_format>apache</log_format>
      <location>/var/log/apache2/other_vhosts_access.log</location>
    </localfile>
    <!-- ==================== OPENVPN LOGS ==================== -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/openvpn.log</location>
    </localfile>
    <!-- OpenVPN status — connected clients -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/openvpn-status.log</location>
    </localfile>
    <!-- ==================== MARIADB LOGS ==================== -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/mysql/error.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/mysql/mysql.log</location>
    </localfile>
    <!-- ==================== FAIL2BAN LOGS ==================== -->
    <!-- 6 jails: apache-auth, apache-badbots, apache-noscript, -->
    <!--          apache-overflows, mysqld-auth, sshd            -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/fail2ban.log</location>
    </localfile>
    <!-- ==================== AUDIT LOGS ==================== -->
    <!-- Auditd already monitors: passwd, shadow, sudoers,     -->
    <!-- SSH config, Apache, webroot, MySQL, Samba,            -->
    <!-- Cloudflared, OpenVPN, cron, execve                    -->
    <localfile>
      <log_format>audit</log_format>
      <location>/var/log/audit/audit.log</location>
    </localfile>
    <!-- ==================== MAIL LOGS ==================== -->
    <!-- Exim4 mail server -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/exim4/mainlog</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/exim4/rejectlog</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/exim4/paniclog</location>
    </localfile>
    <!-- ==================== SAMBA LOGS ==================== -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/samba/log.smbd</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/samba/log.nmbd</location>
    </localfile>
    <!-- ==================== CLOUDFLARED LOGS ==================== -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/cloudflared.log</location>
    </localfile>
    <!-- ==================== UFW FIREWALL ==================== -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/ufw.log</location>
    </localfile>
    <!-- ==================== COMMAND MONITORING ==================== -->
    <!-- Disk usage — SD card health critical -->
    <localfile>
      <log_format>command</log_format>
      <command>df -P</command>
      <frequency>360</frequency>
    </localfile>
    <!-- CPU temperature -->
    <localfile>
      <log_format>full_command</log_format>
      <command>vcgencmd measure_temp 2>/dev/null || cat /sys/class/thermal/thermal_zone0/temp</command>
      <frequency>300</frequency>
    </localfile>
    <!-- Open ports — detect new listeners -->
    <localfile>
      <log_format>full_command</log_format>
      <command>ss -tlnp | grep LISTEN | sort</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Recent logins -->
    <localfile>
      <log_format>full_command</log_format>
      <command>last -n 10</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Running processes — detect crypto miners etc -->
    <localfile>
      <log_format>full_command</log_format>
      <command>ps aux --sort=-%cpu | head -15</command>
      <frequency>600</frequency>
    </localfile>
    <!-- OpenVPN connected clients -->
    <localfile>
      <log_format>full_command</log_format>
      <command>cat /var/log/openvpn-status.log 2>/dev/null | grep "^CLIENT_LIST" | head -20</command>
      <frequency>300</frequency>
    </localfile>
    <!-- Fail2ban banned IPs -->
    <localfile>
      <log_format>full_command</log_format>
      <command>sudo fail2ban-client status sshd 2>/dev/null | grep "Banned IP"</command>
      <frequency>360</frequency>
    </localfile>
    <!-- WordPress wp-login.php hit count — brute force indicator -->
    <localfile>
      <log_format>full_command</log_format>
      <command>grep "wp-login.php" /var/log/apache2/aftergrade12_access.log 2>/dev/null | wc -l</command>
      <frequency>300</frequency>
    </localfile>
    <!-- WordPress xmlrpc.php hits — common attack vector -->
    <localfile>
      <log_format>full_command</log_format>
      <command>grep "xmlrpc.php" /var/log/apache2/aftergrade12_access.log 2>/dev/null | wc -l</command>
      <frequency>300</frequency>
    </localfile>
    <!-- MariaDB process list — detect long queries / attacks -->
    <localfile>
      <log_format>full_command</log_format>
      <command>sudo mysql -e "SHOW PROCESSLIST;" 2>/dev/null | head -10</command>
      <frequency>600</frequency>
    </localfile>
    <!-- Samba connected users -->
    <localfile>
      <log_format>full_command</log_format>
      <command>sudo smbstatus -b 2>/dev/null | head -20</command>
      <frequency>360</frequency>
    </localfile>
    <!-- Cloudflare tunnel status -->
    <localfile>
      <log_format>full_command</log_format>
      <command>sudo cloudflared tunnel info aftergrade12 2>/dev/null | grep -E "STATUS|CONNECTIONS"</command>
      <frequency>600</frequency>
    </localfile>
    <!-- Who is logged in -->
    <localfile>
      <log_format>full_command</log_format>
      <command>who</command>
      <frequency>360</frequency>
    </localfile>
    <localfile>
      <log_format>full_command</log_format>
      <command>curl -s https://api.ipify.org 2>/dev/null || echo "unknown"</command>
      <alias>public_ip_check</alias>
      <frequency>3600</frequency>
    </localfile>
    <!-- ==================== SYSCOLLECTOR ==================== -->
    <wodle name="syscollector">
      <disabled>no</disabled>
      <interval>24h</interval>
      <scan_on_start>yes</scan_on_start>
      <packages>yes</packages>
      <os>yes</os>
      <ports all="no">yes</ports>
      <processes>yes</processes>
      <hardware>yes</hardware>
      <network>yes</network>
    </wodle>
    <!-- ==================== OSQUERY (optional) ==================== -->
    <!-- Enable with: sudo apt-get install osquery -->
    <wodle name="osquery">
      <disabled>yes</disabled>
      <run_daemon>yes</run_daemon>
      <log_path>/var/log/osquery/osqueryd.results.log</log_path>
      <config_path>/etc/osquery/osquery.conf</config_path>
      <add_labels>yes</add_labels>
    </wodle>
  </agent_config>
